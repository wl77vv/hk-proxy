# ========== 核心及插件基础配置 ==========
allow-lan: false
keep-alive-interval: 15
keep-alive-idle: 600
geodata-mode: true
find-process-mode: "always"
ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

# ========== 嗅探器 ==========
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 443, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 853, 8443]
    QUIC:
      ports: [443, 853, 8443]
# ========== DNS防泄漏系统 (大陆特供 Fake-IP 版) ==========
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  use-hosts: false
  respect-rules: true
  direct-nameserver-follow-policy: true
  hijack:
    - 'any:53'
    - 'tcp://any:53'
  default-nameserver:
    - 223.5.5.5:53
    - 119.29.29.29:53
  proxy-server-nameserver:
    - 1.1.1.1:53
    - 8.8.8.8:53
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: false
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
  fake-ip-filter: ['rule-set:fakeip-filter']

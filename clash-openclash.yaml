# ============================================================
# Clash 配置 — OpenClash 兼容版
# ============================================================

mode: rule
unified-delay: true
tcp-concurrent: true
log-level: info

# ========== 规则集定义 ==========
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.txt
    interval: 86400
